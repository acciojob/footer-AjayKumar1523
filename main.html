<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footer</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
}

/* Footer */
footer{
  background:#000;
  color:#fff;
}

/* Social icons */
.media-icons{
  display:flex;
  gap:12px;
  margin-bottom:20px;
}

.media-icons a{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#444;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
}

/* REQUIRED BY TEST */
.link-boxes{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  padding:40px 60px;
}

.box{
  flex:1 1 200px;
  margin:10px;
}

.box h3{
  margin-bottom:10px;
}

.box ul{
  list-style:none;
  padding:0;
}

.box ul li{
  margin:8px 0;
}

.box ul li a{
  color:#ccc;
  text-decoration:none;
}

/* Footer bottom */
.footer-bottom{
  background:#2f3640;
  padding:15px 60px;
  display:flex;
  justify-content:space-between;
  color:#ccc;
}

/* Responsive */
@media(max-width:768px){
  .link-boxes{
    padding:30px;
  }
  .footer-bottom{
    flex-direction:column;
    text-align:center;
    gap:10px;
  }
}
</style>
</head>

<body>

<footer>

  <!-- Social Media -->
  <div class="media-icons">
    <a href="#">f</a>
    <a href="#">t</a>
    <a href="#">i</a>
    <a href="#">in</a>
    <a href="#">yt</a>
  </div>

  <!-- REQUIRED LINK BOXES -->
  <div class="link-boxes">

    <div class="box">
      <h3>Links</h3>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Links</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </div>

    <div class="box">
      <h3>Services</h3>
      <ul>
        <li>App Design</li>
        <li>Web Design</li>
        <li>Logo Design</li>
        <li>Banner Design</li>
      </ul>
    </div>

    <div class="box">
      <h3>Contact</h3>
      <p>8879887262</p>
      <p>+91 8879887262</p>
      <p>contact@company.com</p>
    </div>

  </div>

  <div class="footer-bottom">
    <span>Copyright © 2021 company.</span>
    <span>Privacy policy</span>
  </div>

</footer>

</body>
</html>
